<!DOCTYPE html>


<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; maxTrack: 2" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="pedestal" src="pedestal.glb"></a-asset-item>
        <a-asset-item id="avatarModel" src="Bin.glb"></a-asset-item>
        <a-asset-item id="Clippy" src="Clippy.glb"></a-asset-item>
        <video id="video" src="rick roll.mp4" loop="true"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane colour="white" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-plane>
        <!-- <a-gltf-model rotation="90 0 0 " position="0 0 0.4" scale="0.5 0.5 0.5" src="#pedestal"></a-gltf-model> -->
        <!-- <a-gltf-model rotation="90 0 0 " position="0 -0.1 0.8" scale="1 1 1" src="#avatarModel"></a-gltf-model> -->
        <a-video src="#video" position="0 0.1 0.8" rotation="-90 0 0" width="1" height="0.5"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-plane colour="white" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-plane>
        <a-gltf-model rotation="90 0 0 " position="0 0 0.4" scale="0.5 0.5 0.5" src="#pedestal"></a-gltf-model>
        <a-gltf-model rotation="90 0 0 " position="0 -0.1 0.8" scale="1 1 1" src="#Clippy"></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
